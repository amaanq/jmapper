[server]
bind         = "127.0.0.1:8765"
cors_origins = [ "http://localhost:3000", "http://localhost:5173" ]
session_url  = "http://localhost:8765"
# libpq-style connection string; unix socket peer auth is the intended
# production shape (`host=/run/postgresql`), TCP works for dev.
database_url = "host=/tmp dbname=jmapper"
# CalDAV/CardDAV refresh cadence. Set to 0 to disable periodic refresh.
dav_sync_interval_seconds = 60

[[accounts]]
backfill_days = 0                                 # full history; use a positive day count to bound the first sync
bearer_token  = "REPLACE_ME_WITH_A_RANDOM_STRING"
display_name  = "Personal"
email         = "you@gmail.com"
id            = "me-gmail"
provider      = "gmail"

[accounts.gmail]
app_password = "abcd efgh ijkl mnop"

# Optional DAV endpoints. Each endpoint may use auth = "none", "basic", or
# "bearer". These tokens are independent of the Gmail IMAP OAuth bootstrap.
# [accounts.caldav]
# url = "https://dav-provider.example/calendars/you/"
# auth = "bearer"
# token = "CURRENT_DAV_ACCESS_TOKEN"
#
# [accounts.carddav]
# url = "https://dav-provider.example/addressbooks/you/"
# auth = "bearer"
# token = "CURRENT_DAV_ACCESS_TOKEN"

# [[accounts]]
# id = "me-fastmail"
# email = "you@fastmail.com"
# display_name = "Work"
# provider = "imap"
