# cargo-deny config. Every category is a CI gate.
# Run locally with:  cargo deny check

[graph]
all-features        = true
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = [ "https://github.com/rustsec/advisory-db" ]
ignore  = [  ]
version = 2
yanked  = "warn"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
version = 2

[bans]
deny              = [ { name = "native-tls" }, { name = "openssl" }, { name = "openssl-sys" } ]
highlight         = "all"
multiple-versions = "warn"
wildcards         = "deny"

[sources]
allow-registry   = [ "https://github.com/rust-lang/crates.io-index" ]
unknown-git      = "deny"
unknown-registry = "deny"
